<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a365d" opacity="0.1"/>
  
  <!-- DNA helix strands -->
  <path d="M 60 50 Q 80 70 60 90 Q 40 110 60 130 Q 80 150 60 170" 
        stroke="#0891b2" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 140 50 Q 120 70 140 90 Q 160 110 140 130 Q 120 150 140 170" 
        stroke="#0891b2" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Connecting bars (DNA base pairs) -->
  <line x1="60" y1="70" x2="140" y2="70" stroke="#059669" stroke-width="3" opacity="0.7"/>
  <line x1="60" y1="90" x2="140" y2="90" stroke="#059669" stroke-width="3" opacity="0.7"/>
  <line x1="60" y1="110" x2="140" y2="110" stroke="#059669" stroke-width="3" opacity="0.7"/>
  <line x1="60" y1="130" x2="140" y2="130" stroke="#059669" stroke-width="3" opacity="0.7"/>
  <line x1="60" y1="150" x2="140" y2="150" stroke="#059669" stroke-width="3" opacity="0.7"/>
  
  <!-- Central digital/AI elements (circuit pattern) -->
  <circle cx="100" cy="70" r="5" fill="#0891b2"/>
  <circle cx="100" cy="90" r="5" fill="#0891b2"/>
  <circle cx="100" cy="110" r="5" fill="#0891b2"/>
  <circle cx="100" cy="130" r="5" fill="#0891b2"/>
  <circle cx="100" cy="150" r="5" fill="#0891b2"/>
  
  <!-- Outer ring with gradient -->
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ringGradient)" stroke-width="3" opacity="0.8"/>
  
  <!-- Small accent dots (representing data points) -->
  <circle cx="50" cy="100" r="3" fill="#059669"/>
  <circle cx="150" cy="100" r="3" fill="#059669"/>
  <circle cx="100" cy="40" r="3" fill="#059669"/>
  <circle cx="100" cy="160" r="3" fill="#059669"/>
</svg>
